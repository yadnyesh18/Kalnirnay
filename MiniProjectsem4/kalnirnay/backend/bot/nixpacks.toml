[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "tesseract", "libGL", "glib"]
aptPkgs = ["tesseract-ocr", "tesseract-ocr-eng", "libgl1", "libglib2.0-0"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/python -m spacy download en_core_web_sm"
]

[start]
cmd = "/opt/venv/bin/python bot.py"
